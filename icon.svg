<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#162e2e" stroke-width="1.2"/>
  </pattern>
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="5" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
</defs>

<!-- Background -->
<rect width="512" height="512" fill="#0c1a1a"/>
<rect width="512" height="512" fill="url(#grid)" opacity="0.6"/>

<!-- Corner embellishments -->
<g stroke="#c5a880" stroke-width="2" fill="none">
  <!-- Top Left -->
  <g transform="translate(48, 48)">
    <path d="M 0,0 L 36,0 M 0,0 L 0,36" opacity="0.5"/>
    <path d="M 18,18 Q 18,4 18,4 Q 18,18 32,18 Q 18,18 18,32 Q 18,18 4,18 Z" fill="#c5a880" stroke="none"/>
  </g>
  <!-- Top Right -->
  <g transform="translate(464, 48)">
    <path d="M 0,0 L -36,0 M 0,0 L 0,36" opacity="0.5"/>
    <path d="M -18,18 Q -18,4 -18,4 Q -18,18 -32,18 Q -18,18 -18,32 Q -18,18 -4,18 Z" fill="#c5a880" stroke="none"/>
  </g>
  <!-- Bottom Left -->
  <g transform="translate(48, 464)">
    <path d="M 0,0 L 36,0 M 0,0 L 0,-36" opacity="0.5"/>
    <path d="M 18,-18 Q 18,-4 18,-4 Q 18,-18 32,-18 Q 18,-18 18,-32 Q 18,-18 4,-18 Z" fill="#c5a880" stroke="none"/>
  </g>
  <!-- Bottom Right -->
  <g transform="translate(464, 464)">
    <path d="M 0,0 L -36,0 M 0,0 L 0,-36" opacity="0.5"/>
    <path d="M -18,-18 Q -18,-4 -18,-4 Q -18,-18 -32,-18 Q -18,-18 -18,-32 Q -18,-18 -4,-18 Z" fill="#c5a880" stroke="none"/>
  </g>
</g>

<!-- Network / Lineage Graph -->
<g stroke="#1d4d4d" stroke-width="2.5" fill="none">
  <!-- Main connecting lines -->
  <path d="M 200,360 L 280,240 L 400,200 L 460,320" stroke="#c5a880" stroke-width="3" stroke-dasharray="6,6"/>
  <line x1="280" y1="240" x2="340" y2="100" stroke="#1da194" stroke-width="4"/>
  <line x1="400" y1="200" x2="340" y2="100" stroke="#1da194" stroke-width="4"/>
  <line x1="200" y1="360" x2="130" y2="260" stroke-width="2"/>
  <line x1="200" y1="360" x2="300" y2="430" stroke-width="2"/>
  <line x1="460" y1="320" x2="520" y2="220" stroke-width="2"/>
  <line x1="460" y1="320" x2="350" y2="440" stroke-width="2"/>
  <!-- Peripheral lines -->
  <path d="M 130,260 L 80,300 M 520,220 L 560,260" opacity="0.4"/>
  <path d="M 300,430 L 340,470 L 380,430" opacity="0.4"/>
</g>

<!-- Network Nodes -->
<circle cx="340" cy="100" r="16" fill="#0c1a1a" stroke="#1da194" stroke-width="5" filter="url(#glow)"/>
<circle cx="340" cy="100" r="6" fill="#c5a880"/>

<circle cx="280" cy="240" r="12" fill="#0c1a1a" stroke="#c5a880" stroke-width="3.5"/>
<circle cx="400" cy="200" r="12" fill="#0c1a1a" stroke="#c5a880" stroke-width="3.5"/>

<circle cx="200" cy="360" r="14" fill="#1da194" stroke="#0c1a1a" stroke-width="3"/>
<circle cx="460" cy="320" r="14" fill="#1da194" stroke="#0c1a1a" stroke-width="3"/>

<circle cx="130" cy="260" r="8" fill="#163838" stroke="#1da194" stroke-width="2.5"/>
<circle cx="520" cy="220" r="8" fill="#163838" stroke="#1da194" stroke-width="2.5"/>
<circle cx="300" cy="430" r="8" fill="#163838" stroke="#c5a880" stroke-width="2"/>
<circle cx="380" cy="430" r="8" fill="#163838" stroke="#c5a880" stroke-width="2"/>

<!-- Central ornament (❖) -->
<g transform="translate(340, 280)">
  <path d="M 0,-32 L 24,0 L 0,32 L -24,0 Z" fill="none" stroke="#c5a880" stroke-width="2" opacity="0.8"/>
  <path d="M 0,-18 L 14,0 L 0,18 L -14,0 Z" fill="#c5a880" opacity="0.3"/>
</g>

<!-- Floating data points -->
<circle cx="310" cy="170" r="3" fill="#c5a880" opacity="0.6"/>
<circle cx="370" cy="160" r="3" fill="#c5a880" opacity="0.6"/>
<circle cx="250" cy="310" r="2" fill="#1da194" opacity="0.7"/>
<circle cx="430" cy="290" r="2" fill="#1da194" opacity="0.7"/>
<circle cx="320" cy="380" r="2.5" fill="#c5a880" opacity="0.5"/>
<circle cx="410" cy="370" r="2.5" fill="#c5a880" opacity="0.5"/>

<!-- Subtle world/region shape -->
<path d="M 120,380 Q 180,340 280,360 T 440,350 T 530,390 Q 490,440 380,430 T 200,440 Z"
      fill="#102626" opacity="0.3"/>
</svg>
